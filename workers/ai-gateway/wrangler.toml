# wrangler.toml for Cloudflare AI Gateway
name = "kg-ai-gateway"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
CORS_ORIGIN = "*"
GOOGLE_SPREADSHEET_ID = "1TCVdHWwve9xHmBC89QYZnbrmhrhDsqin9S9jtZRj-r8"
SUPABASE_JWT_SECRET = "" # Configure in production secrets

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "kg-images"
preview_bucket_name = "kg-images-preview"

